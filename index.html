<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7Crew KPI Report — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f5f7;--surface:#fff;--surface2:#eeeff2;--border:#e2e4e9;--border2:#d0d3da;--accent:#cd2128;--text:#111318;--subtext:#4a5060;--muted:#8a919e;}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.08);width:380px;max-width:92vw;padding:32px 30px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent)}
h1{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:4px}
.sub{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--muted);margin-bottom:24px;letter-spacing:.5px}
label{display:block;font-family:'DM Mono',monospace;font-size:9.5px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:6px}
input{width:100%;padding:10px 12px;border:1.5px solid var(--border2);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;background:var(--surface2);outline:none;margin-bottom:16px;transition:border-color .2s}
input:focus{border-color:var(--accent);background:#fff}
button{width:100%;padding:11px;font-family:'DM Mono',monospace;font-size:11.5px;font-weight:600;letter-spacing:.5px;border:none;border-radius:7px;background:var(--accent);color:#fff;cursor:pointer;transition:background .15s}
button:hover{background:#a81a1f}
button:disabled{background:var(--muted);cursor:default}
.err{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--accent);margin-top:12px;min-height:14px}
.foot{margin-top:20px;font-family:'DM Mono',monospace;font-size:9.5px;color:var(--muted);text-align:center}
</style>
</head>
<body>
<div class="card">
  <h1>7CREW LEADERSHIP KPI</h1>
  <div class="sub">SIGN IN TO CONTINUE</div>
  <form id="loginForm" onsubmit="return doLogin(event)">
    <label>Email</label>
    <input type="text" id="username" autocomplete="username" placeholder="you@7crew.com" required>
    <label>Password</label>
    <input type="password" id="password" autocomplete="current-password" required>
    <button type="submit" id="loginBtn">Sign In</button>
    <div class="err" id="loginErr"></div>
  </form>
  <div class="foot">Confidential — Authorized Personnel Only</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<script src="shared.js?v=19"></script>
<script>
// If already logged in, skip straight to the right view.
auth.onAuthStateChanged(async (user)=>{
  if(!user) return;
  const doc = await db.collection('users').doc(user.uid).get();
  if(doc.exists){ location.href = doc.data().role==='admin' ? 'admin.html' : 'leader.html'; }
});

async function doLogin(ev){
  ev.preventDefault();
  const btn=document.getElementById('loginBtn');
  const err=document.getElementById('loginErr');
  err.textContent='';
  btn.disabled=true; btn.textContent='Signing in…';
  const email=document.getElementById('username').value.trim();
  const password=document.getElementById('password').value;
  try{
    const cred = await auth.signInWithEmailAndPassword(email, password);
    const doc = await db.collection('users').doc(cred.user.uid).get();
    if(!doc.exists){ err.textContent='No profile set up for this login yet — contact an admin.'; btn.disabled=false; btn.textContent='Sign In'; return false; }
    location.href = doc.data().role==='admin' ? 'admin.html' : 'leader.html';
  }catch(e){
    err.textContent = e.code==='auth/invalid-credential' || e.code==='auth/wrong-password' || e.code==='auth/user-not-found'
      ? 'Incorrect email or password.' : 'Could not sign in — try again.';
    btn.disabled=false; btn.textContent='Sign In';
  }
  return false;
}
</script>
</body>
</html>
